  <script>
    (function normalizePortfolioRoute() {
      var hash = window.location.hash.replace(/^#\/?/, '');
      var path = window.location.pathname;
      var knownPages = ['about', 'resume', 'competencies', 'artifacts', 'gallery', 'contact'];

      if (hash && knownPages.indexOf(hash) !== -1) {
        window.history.replaceState({}, '', '/' + hash + window.location.search);
        return;
      }

      if (!/\/index\.html$/.test(path)) return;

      var cleanPath = path.replace(/index\.html$/, '');
      window.history.replaceState({}, '', cleanPath + window.location.search + window.location.hash);
    })();
  </script>
